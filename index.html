<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8b5a2b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="灌顶功课" />
  <link rel="manifest" href="manifest.json?v=18" />
  <link rel="apple-touch-icon" sizes="180x180" href="./om-apple-touch-icon.png" />
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./om-apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./favicon-192.png" />
  <link rel="shortcut icon" href="./favicon.ico" />
  <title>灌顶功课</title>
  <style>
    :root {
      --bg: #fbf7ef;
      --panel: #fffaf2;
      --panel-2: #fff3df;
      --text: #2e2419;
      --muted: #7a6b5a;
      --line: #ead9c5;
      --brand: #8b5a2b;
      --brand-2: #c68b42;
      --danger: #b9473f;
      --ok: #537a42;
      --shadow: 0 12px 30px rgba(64, 42, 22, .12);
      --radius: 20px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
    body { padding-bottom: calc(76px + var(--safe-bottom)); }
    button, input, select, textarea { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }
    a { color: var(--brand); }

    .app { max-width: 720px; margin: 0 auto; min-height: 100vh; }
    .topbar { position: sticky; top: 0; z-index: 10; background: rgba(251,247,239,.9); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(234,217,197,.75); padding: 14px 16px 10px; }
    .toprow { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    h1 { font-size: 20px; margin: 0; letter-spacing: .02em; }
    .subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .page { display: none; padding: 14px 14px 24px; }
    .page.active { display: block; }

    .bottom-nav { position: fixed; left: 50%; bottom: 0; transform: translateX(-50%); z-index: 20; width: 100%; max-width: 720px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; padding: 8px 8px calc(8px + var(--safe-bottom)); background: rgba(255,250,242,.96); border-top: 1px solid var(--line); backdrop-filter: blur(18px); }
    .nav-btn { border: 0; background: transparent; color: var(--muted); padding: 7px 2px; border-radius: 14px; display: grid; gap: 3px; place-items: center; font-size: 11px; }
    .nav-btn .ico { font-size: 20px; line-height: 1; }
    .nav-btn.active { background: var(--panel-2); color: var(--brand); font-weight: 700; }

    .card { background: var(--panel); border: 1px solid var(--line); box-shadow: var(--shadow); border-radius: var(--radius); padding: 14px; margin: 10px 0; }
    .soft { background: rgba(255,250,242,.75); border: 1px solid var(--line); border-radius: 16px; padding: 12px; }
    .row { display: flex; gap: 10px; align-items: center; }
    .row.wrap { flex-wrap: wrap; }
    .between { justify-content: space-between; }
    .grow { flex: 1; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .tiny { font-size: 11px; }
    .section-title { font-size: 15px; font-weight: 800; margin: 18px 2px 8px; }
    .pill { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); border-radius: 999px; padding: 4px 8px; background: #fff; font-size: 12px; color: var(--muted); white-space: nowrap; }
    .status-badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 8px; font-size: 12px; font-weight: 700; white-space: nowrap; border: 1px solid transparent; }
    .status-badge.missing { color: #9a4a2a; background: #fff1e6; border-color: #f1c6aa; }
    .status-badge.progressing { color: #7a5a18; background: #fff6d8; border-color: #ead48a; }
    .status-badge.done { color: #3f6f37; background: #edf7e8; border-color: #bdd9b3; }
    .dot { width: 8px; height: 8px; border-radius: 999px; display: inline-block; background: var(--brand-2); }
    .btn { border: 1px solid var(--line); background: #fff; color: var(--text); border-radius: 13px; padding: 9px 12px; min-height: 40px; cursor: pointer; }
    .btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .btn.ghost { background: transparent; }
    .btn.danger { background: #fff; border-color: rgba(185,71,63,.35); color: var(--danger); }
    .btn.smallbtn { padding: 6px 9px; min-height: 32px; border-radius: 11px; font-size: 12px; }
    .icon-btn { width: 40px; height: 40px; border-radius: 14px; border: 1px solid var(--line); background: #fff; display: grid; place-items: center; }
    .fab { position: fixed; right: calc(18px + max(0px, (100vw - 720px)/2)); bottom: calc(90px + var(--safe-bottom)); z-index: 18; width: 56px; height: 56px; border-radius: 22px; border: 0; background: var(--brand); color: white; box-shadow: 0 16px 35px rgba(96, 57, 21, .35); font-size: 28px; }

    input, select, textarea { width: 100%; border: 1px solid var(--line); background: #fff; border-radius: 13px; padding: 10px 11px; color: var(--text); min-height: 42px; }
    textarea { min-height: 100px; resize: vertical; line-height: 1.5; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 5px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .chip { border: 1px solid var(--line); border-radius: 999px; background: #fff; padding: 7px 10px; font-size: 12px; color: var(--muted); }
    .chip.selected { background: var(--brand); color: white; border-color: var(--brand); }
    .hidden { display: none !important; }

    .month-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 4px 0 10px; }
    .month-title { font-size: 18px; font-weight: 800; }
    .month-title.pickable { border: 1px solid var(--line); background: #fff; border-radius: 14px; padding: 8px 12px; cursor: pointer; }
    .month-picker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .month-option { border: 1px solid var(--line); background: #fff; border-radius: 13px; padding: 10px 6px; min-height: 40px; }
    .month-option.selected { background: var(--brand); color: #fff; border-color: var(--brand); }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .dow { text-align: center; font-size: 11px; color: var(--muted); padding: 3px 0; }
    .day { min-height: 52px; border: 1px solid var(--line); background: rgba(255,255,255,.74); border-radius: 14px; padding: 6px 5px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; gap: 4px; }
    .day.out { opacity: .32; }
    .day.today { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(139,90,43,.12) inset; }
    .day.selected { background: var(--panel-2); border-color: var(--brand-2); }
    .day-num { font-size: 13px; font-weight: 700; }
    .day-dots { min-height: 11px; display: flex; gap: 3px; justify-content: center; flex-wrap: wrap; max-width: 42px; }
    .day-count { font-size: 10px; color: var(--muted); }

    .list-card { display: flex; gap: 10px; align-items: flex-start; border: 1px solid var(--line); background: #fff; border-radius: 16px; padding: 12px; margin: 9px 0; }
    .list-card.dragging { opacity: .72; box-shadow: 0 18px 42px rgba(64,42,22,.22); }
    .list-card .bar { width: 5px; align-self: stretch; border-radius: 999px; background: var(--brand-2); flex: 0 0 auto; }
    .drag-handle { flex: 0 0 auto; width: 32px; height: 32px; border: 1px solid var(--line); border-radius: 12px; background: #fffaf2; color: var(--muted); display: grid; place-items: center; cursor: grab; touch-action: none; user-select: none; -webkit-user-select: none; }
    .drag-handle:active { cursor: grabbing; background: var(--panel-2); }
    .daily-sort-zone { min-height: 8px; }
    .list-card h3 { margin: 0 0 4px; font-size: 15px; }
    .meta { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .empty { text-align: center; color: var(--muted); padding: 28px 12px; }

    dialog { border: 0; padding: 0; border-radius: 24px; width: min(680px, calc(100vw - 18px)); max-height: min(92dvh, 920px); background: var(--panel); box-shadow: 0 35px 90px rgba(39,25,12,.35); overflow: hidden; }
    dialog[open] { display: flex; flex-direction: column; }
    dialog::backdrop { background: rgba(35, 24, 13, .42); backdrop-filter: blur(6px); }
    #modalContent { width: 100%; max-height: min(92dvh, 920px); min-height: 0; display: flex; flex-direction: column; }
    #modalContent > form { max-height: min(92dvh, 920px); min-height: 0; display: flex; flex-direction: column; }
    .modal-head { position: sticky; top: 0; flex: 0 0 auto; background: var(--panel); border-bottom: 1px solid var(--line); padding: 13px 14px; display: flex; justify-content: space-between; align-items: center; z-index: 2; }
    .modal-title { font-weight: 900; }
    .modal-body { flex: 1 1 auto; min-height: 0; padding: 12px 14px calc(34px + var(--safe-bottom)); overflow-y: auto; overflow-x: hidden; max-height: calc(min(92dvh, 920px) - 122px); -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
    .modal-actions { flex: 0 0 auto; position: sticky; bottom: 0; background: var(--panel); border-top: 1px solid var(--line); padding: 12px 14px calc(12px + var(--safe-bottom)); display: flex; gap: 10px; justify-content: flex-end; z-index: 3; }

    .rich-toolbar { display: flex; gap: 6px; flex-wrap: wrap; border: 1px solid var(--line); border-radius: 14px 14px 0 0; background: #fff; padding: 7px; }
    .rich-toolbar button, .rich-toolbar select { width: auto; min-height: 32px; padding: 5px 8px; border-radius: 10px; border: 1px solid var(--line); background: #fff; font-size: 12px; }
    .rich-editor { min-height: 180px; padding: 12px; border: 1px solid var(--line); border-top: 0; border-radius: 0 0 14px 14px; background: #fff; line-height: 1.6; outline: none; overflow: auto; }
    .rich-editor:empty:before { content: attr(data-placeholder); color: #b2a391; }
    .rich-editor mark { background: #fff1a8; padding: 1px 2px; border-radius: 4px; }

    .detail h2 { margin: 4px 0 8px; font-size: 20px; }
    .kv { display: grid; grid-template-columns: 92px 1fr; gap: 7px 9px; font-size: 13px; padding: 8px 0; border-bottom: 1px dashed var(--line); }
    .kv .k { color: var(--muted); }
    .visual-html { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 12px; line-height: 1.65; overflow-wrap: break-word; }

    .color-swatch { width: 24px; height: 24px; border-radius: 999px; border: 2px solid rgba(0,0,0,.08); display: inline-block; }
    input[type="color"] { padding: 3px; min-height: 42px; }
    .progress { height: 8px; background: #ead9c5; border-radius: 999px; overflow: hidden; margin-top: 8px; }
    .progress > div { height: 100%; background: var(--brand-2); width: 0%; }

    @media (min-width: 560px) { .day { min-height: 62px; } .page { padding-left: 18px; padding-right: 18px; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="toprow">
        <div>
          <h1 id="pageTitle">灌顶与功课记录</h1>
          <div class="subtitle" id="pageSubtitle">本地保存 · 请定期备份</div>
        </div>
        <button class="icon-btn" id="quickBackupBtn" title="导出备份">⤓</button>
      </div>
    </header>

    <main>
      <section id="page-calendar" class="page active"></section>
      <section id="page-records" class="page"></section>
      <section id="page-daily" class="page"></section>
      <section id="page-resources" class="page"></section>
      <section id="page-settings" class="page"></section>
    </main>

    <button class="fab" id="fab" aria-label="新增">＋</button>

    <nav class="bottom-nav" aria-label="主导航">
      <button class="nav-btn active" data-tab="calendar"><span class="ico">月</span><span>日历</span></button>
      <button class="nav-btn" data-tab="records"><span class="ico">册</span><span>记录</span></button>
      <button class="nav-btn" data-tab="daily"><span class="ico">念</span><span>功课</span></button>
      <button class="nav-btn" data-tab="resources"><span class="ico">卷</span><span>法本</span></button>
      <button class="nav-btn" data-tab="settings"><span class="ico">设</span><span>设置</span></button>
    </nav>
  </div>

  <dialog id="modal"><div id="modalContent"></div></dialog>
  <input id="fileInput" type="file" class="hidden" />

  <script>
  (() => {
    const STORE_KEY = 'dharmaRecordsApp.v2';
    const todayStr = () => toDateStr(new Date());
    const nowIso = () => new Date().toISOString();
    const uid = (prefix='id') => `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
    const $ = (sel, root=document) => root.querySelector(sel);
    const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
    const esc = (v='') => String(v ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const stripHtml = (html='') => {
      const div = document.createElement('div'); div.innerHTML = html || ''; return div.textContent || div.innerText || '';
    };
    const norm = v => String(v ?? '').trim();
    const asArray = v => Array.isArray(v) ? v : (v ? String(v).split(/[，,]/).map(s=>s.trim()).filter(Boolean) : []);
    const fmtDate = d => d ? d.replaceAll('-', '/') : '';
    const toDateStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const parseLocalDate = s => { const [y,m,d] = String(s||todayStr()).split('-').map(Number); return new Date(y, (m||1)-1, d||1); };
    const addMonths = (date, n) => new Date(date.getFullYear(), date.getMonth()+n, 1);
    const monthKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

    const defaultTypes = [
      {name:'灌顶', color:'#d97745'}, {name:'口传', color:'#4f82c0'}, {name:'开示', color:'#5b8c5a'},
      {name:'法会', color:'#8b6fc6'}, {name:'共修', color:'#d39b34'}, {name:'其他', color:'#8c8c8c'}
    ];
    const defaultSettings = {
      defaultLocation: '', defaultLineage: '宁玛', defaultStatus: '', defaultPrivacy: '私密',
      defaultDailyCount: 108, defaultDailyPracticeStatus: '进行中', calendarWeekStart: '周一', language: '中文', theme: 'default', lastBackupAt: ''
    };
    const defaultState = () => ({
      records: [],
      dailyItems: [],
      dailyCounts: [],
      resources: [],
      typeSettings: defaultTypes.map((t,i)=>({ id: uid('typ'), name:t.name, color:t.color, isDefault:true, sortOrder:i+1, createdAt:nowIso(), updatedAt:nowIso() })),
      settings: {...defaultSettings}
    });

    let state = loadState();
    let currentTab = 'calendar';
    let currentMonth = parseLocalDate(todayStr());
    let selectedDate = todayStr();
    let selectedDailyId = null;
    let dailyMonth = parseLocalDate(todayStr());
    let dailySortSuppressClick = false;

    function loadState(){
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (!raw) return defaultState();
        const s = JSON.parse(raw);
        return migrate(s);
      } catch(e) { console.warn(e); return defaultState(); }
    }
    function migrate(s){
      const base = defaultState();
      const merged = { ...base, ...s };
      merged.records = (merged.records || []).map(r => ({
        ...r,
        categories: asArray(r.categories), customCategories: asArray(r.customCategories),
        visualizationNotesHtml: r.visualizationNotesHtml || r.visualizationNotes || '',
        visualizationNotesPlainText: r.visualizationNotesPlainText || stripHtml(r.visualizationNotesHtml || r.visualizationNotes || ''),
        privacy: r.privacy || merged.settings?.defaultPrivacy || '私密'
      }));
      merged.dailyItems = (merged.dailyItems || []).map(i => ({ ...i, goalPeriod: i.goalPeriod || 'daily', goalCount: Number(i.goalCount || 0), color: i.color || (i.parentId ? '' : inferDailyColor(i)) }));
      const dailyParentIds = new Set(merged.dailyItems.map(i => i.parentId).filter(Boolean));
      merged.dailyItems = merged.dailyItems.map(i => ({ ...i, itemKind: i.itemKind || (i.parentId ? 'sub' : (dailyParentIds.has(i.id) ? 'group' : 'independent')) }));
      merged.dailyCounts = merged.dailyCounts || [];
      merged.resources = merged.resources || [];
      merged.typeSettings = (merged.typeSettings?.length ? merged.typeSettings : base.typeSettings).map(({isHidden, ...t}) => t);
      merged.settings = { ...defaultSettings, ...(merged.settings || {}) };
      return merged;
    }
    function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
    function render(){
      $$('.page').forEach(p => p.classList.remove('active'));
      $(`#page-${currentTab}`).classList.add('active');
      $$('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
      const titles = {calendar:'灌顶与口传记录', records:'记录', daily:'功课', resources:'法本 / 链接', settings:'设置'};
      $('#pageTitle').textContent = titles[currentTab];
      $('#pageSubtitle').textContent = currentTab === 'calendar' ? '按日期查看受法与未来活动' : currentTab === 'daily' ? '独立功课 / 功课组 / 分项功课计数' : '本地保存 · 请定期备份';
      $('#fab').style.display = currentTab === 'settings' ? 'none' : 'block';
      if (currentTab === 'calendar') renderCalendarPage();
      if (currentTab === 'records') renderRecordsPage();
      if (currentTab === 'daily') renderDailyPage();
      if (currentTab === 'resources') renderResourcesPage();
      if (currentTab === 'settings') renderSettingsPage();
    }

    function typeName(r){ return r.customType || r.type || '其他'; }
    function typeSetting(name){ return state.typeSettings.find(t => t.name === name) || state.typeSettings.find(t => t.name === '其他') || {color:'#8c8c8c'}; }
    function recordColor(r){ return typeSetting(typeName(r)).color; }
    function visibleTypeOptions(){ const opts=state.typeSettings.sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0)).map(t=>t.name); return opts.length ? opts : ['其他']; }
    function inferDailyColor(item={}){ const text = `${item.name||''} ${item.deityOrPractice||''} ${item.mantraText||''}`; if(/绿度母|Green Tara/i.test(text)) return '#5b8c5a'; if(/作明佛母|红度母|Kurukulla|Red Tara/i.test(text)) return '#b9473f'; return '#8b5a2b'; }
    function dailyColor(itemOrId){ const item = typeof itemOrId === 'string' ? getDaily(itemOrId) : itemOrId; if(!item) return '#8b5a2b'; if(item.color) return item.color; if(item.parentId) return dailyColor(item.parentId); return inferDailyColor(item); }
    function getRecord(id){ return state.records.find(r=>r.id===id); }
    function getDaily(id){ return state.dailyItems.find(i=>i.id===id); }
    function getResource(id){ return state.resources.find(r=>r.id===id); }
    function childrenOf(id){ return state.dailyItems.filter(i=>i.parentId===id).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0)); }
    function dailyKind(itemOrId){ const item = typeof itemOrId === 'string' ? getDaily(itemOrId) : itemOrId; if(!item) return 'independent'; if(item.itemKind) return item.itemKind; if(item.parentId) return 'sub'; return childrenOf(item.id).length ? 'group' : 'independent'; }
    function dailyKindLabel(itemOrId){ const k=dailyKind(itemOrId); return k==='group'?'功课组':k==='sub'?'分项功课':'独立功课'; }
    function isDailyGroup(itemOrId){ return dailyKind(itemOrId)==='group'; }
    function groupOptions(currentId=''){ return state.dailyItems.filter(i=>i.id!==currentId && !i.parentId && dailyKind(i)==='group').sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0)); }
    function totalForDaily(id){ const item = getDaily(id); return Number(item?.manualBaseCount||0) + state.dailyCounts.filter(c=>c.practiceItemId===id).reduce((a,c)=>a+Number(c.count||0),0); }
    function monthTotalForDaily(id, date=dailyMonth){ const mk = monthKey(date); return state.dailyCounts.filter(c=>c.practiceItemId===id && c.date?.startsWith(mk)).reduce((a,c)=>a+Number(c.count||0),0); }
    function weekRange(date=new Date()){ const d=new Date(date.getFullYear(), date.getMonth(), date.getDate()); const weekStartMonday = state.settings.calendarWeekStart !== '周日'; const day=d.getDay(); const offset=weekStartMonday ? (day+6)%7 : day; const start=new Date(d); start.setDate(d.getDate()-offset); const end=new Date(start); end.setDate(start.getDate()+6); return {start:toDateStr(start), end:toDateStr(end)}; }
    function weekTotalForDaily(id, date=new Date()){ const r=weekRange(date); return state.dailyCounts.filter(c=>c.practiceItemId===id && c.date>=r.start && c.date<=r.end).reduce((a,c)=>a+Number(c.count||0),0); }
    function periodGoalText(item){ const n=Number(item.goalCount||0); if(!n) return ''; const label=item.goalPeriod==='weekly'?'每周':'每日'; const current=item.goalPeriod==='weekly'?weekTotalForDaily(item.id):todayTotalForDaily(item.id); return `${label}目标：${current} / ${n} 遍`; }
    function periodGoalPct(item){ const n=Number(item.goalCount||0); if(!n) return 0; const current=item.goalPeriod==='weekly'?weekTotalForDaily(item.id):todayTotalForDaily(item.id); return Math.min(100, Math.round(current*100/n)); }
    function todayTotalForDaily(id){ return state.dailyCounts.filter(c=>c.practiceItemId===id && c.date===todayStr()).reduce((a,c)=>a+Number(c.count||0),0); }
    function pct(item){ const t = Number(item.targetCount||0); if (!t) return 0; return Math.min(100, Math.round(totalForDaily(item.id)*100/t)); }

    function renderCalendarPage(){
      const root = $('#page-calendar');
      const monthLabel = `${currentMonth.getFullYear()}年${currentMonth.getMonth()+1}月`;
      root.innerHTML = `
        <div class="month-head">
          <button class="icon-btn" data-act="prevMonth">‹</button>
          <button class="month-title pickable" data-act="pickMonth" type="button">${monthLabel}</button>
          <button class="icon-btn" data-act="nextMonth">›</button>
        </div>
        <div class="row between"><button class="btn smallbtn" data-act="today">今天</button><button class="btn smallbtn" data-act="openDateDetail" data-date="${selectedDate}">查看某日详情</button></div>
        <div class="card"><div class="calendar" id="calendarGrid"></div></div>
        <div id="selectedRecords"></div>
      `;
      renderCalendarGrid($('#calendarGrid'), currentMonth, selectedDate, date => state.records.filter(r=>r.date===date), (date)=>{ selectedDate=date; renderCalendarPage(); });
      renderSelectedRecords();
      root.onclick = (e) => {
        const act = e.target.closest('[data-act]')?.dataset.act;
        if (!act) return;
        if (act==='prevMonth') { currentMonth = addMonths(currentMonth, -1); render(); }
        if (act==='pickMonth') openMonthPicker(currentMonth, (d)=>{ currentMonth=d; selectedDate=toDateStr(new Date(d.getFullYear(), d.getMonth(), Math.min(parseLocalDate(selectedDate).getDate(), new Date(d.getFullYear(), d.getMonth()+1, 0).getDate()))); render(); });
        if (act==='nextMonth') { currentMonth = addMonths(currentMonth, 1); render(); }
        if (act==='today') { selectedDate=todayStr(); currentMonth=parseLocalDate(selectedDate); render(); }
        if (act==='openDateDetail') showDateDetail(selectedDate);
      };
    }
    function renderCalendarGrid(root, baseMonth, selected, getItems, onDayClick, opts={}){
      const weekStartMonday = state.settings.calendarWeekStart !== '周日';
      const dows = weekStartMonday ? ['一','二','三','四','五','六','日'] : ['日','一','二','三','四','五','六'];
      root.innerHTML = dows.map(d=>`<div class="dow">${d}</div>`).join('');
      const first = new Date(baseMonth.getFullYear(), baseMonth.getMonth(), 1);
      const firstDow = first.getDay();
      const offset = weekStartMonday ? (firstDow + 6) % 7 : firstDow;
      const start = new Date(first); start.setDate(first.getDate() - offset);
      for (let i=0;i<42;i++){
        const d = new Date(start); d.setDate(start.getDate()+i);
        const ds = toDateStr(d);
        const items = getItems(ds) || [];
        const dots = opts.daily ? (items.length ? `<span class="day-count" style="color:${esc(opts.dailyColor||'var(--muted)')}">${items.reduce((a,x)=>a+Number(x.count||0),0)}</span>` : '') : items.slice(0,3).map(it=>`<span class="dot" style="background:${esc(recordColor(it))}"></span>`).join('');
        const more = !opts.daily && items.length > 3 ? `<span class="tiny muted">${items.length}条</span>` : '';
        const el = document.createElement('button');
        el.type='button';
        el.className = `day ${d.getMonth()!==baseMonth.getMonth()?'out':''} ${ds===todayStr()?'today':''} ${ds===selected?'selected':''}`;
        el.innerHTML = `<span class="day-num">${d.getDate()}</span><span class="day-dots">${dots}${more}</span>`;
        el.addEventListener('click', ()=>onDayClick(ds));
        root.appendChild(el);
      }
    }

    function dailyStatusBadge(label, cls){ return `<span class="status-badge ${cls}">${esc(label)}</span>`; }
    function dailyCheckStatus(item){
      if(!item) return {label:'', cls:'progressing'};
      const kind=dailyKind(item);
      if(kind==='group'){
        const kids=childrenOf(item.id);
        if(!kids.length) return {label:'暂无分项功课', cls:'progressing'};
        const done=kids.filter(k=>todayTotalForDaily(k.id)>0).length;
        return done>0 ? {label:`今日已记录 ${done} / ${kids.length} 项`, cls: done===kids.length?'done':'progressing'} : {label:'今日未记录任何分项', cls:'missing'};
      }
      const goal=Number(item.goalCount||0);
      if(item.goalPeriod==='weekly'){
        const current=weekTotalForDaily(item.id);
        if(current<=0) return {label:'本周未记录', cls:'missing'};
        if(goal && current<goal) return {label:'本周进行中', cls:'progressing'};
        return {label:goal?'本周已达标':'本周已记录', cls:'done'};
      }
      const current=todayTotalForDaily(item.id);
      if(current<=0) return {label:'今日未记录', cls:'missing'};
      if(goal && current<goal) return {label:'已记录，未达标', cls:'progressing'};
      return {label:goal?'今日已达标':'今日已记录', cls:'done'};
    }
    function dailyCard(item, opts={}){
      const kind=dailyKind(item); const kids=childrenOf(item.id); const color=dailyColor(item);
      const reminder = opts.showReminder ? dailyCheckStatus(item) : null;
      const reminderHtml = reminder ? `<div style="margin-top:8px">${dailyStatusBadge(reminder.label, reminder.cls)}</div>` : '';
      if(kind==='group'){

    function deleteDaily(id){
      const item=getDaily(id); if(!item) return;
      if(childrenOf(id).length) return alert('请先删除或移动子功课。');
      if(!confirm(`确定删除「${item.name}」吗？相关计数也会删除。`)) return;
      state.dailyItems=state.dailyItems.filter(x=>x.id!==id); state.dailyCounts=state.dailyCounts.filter(x=>x.practiceItemId!==id); state.resources=state.resources.map(x=>x.relatedDailyPracticeId===id?{...x,relatedDailyPracticeId:''}:x); save(); selectedDailyId=null; render();

    function enableDailySort(container){
      $$('.daily-sort-zone', container).forEach(zone=>{
        zone.addEventListener('pointerdown', e=>{
          const handle=e.target.closest('[data-drag-handle]');
          if(!handle) return;
          const card=handle.closest('[data-daily-id]');
          if(!card || !zone.contains(card)) return;
          e.preventDefault(); e.stopPropagation();
          card.classList.add('dragging');
          let moved=false;
          const onMove=ev=>{
            ev.preventDefault();
            moved=true;
            const after=getDragAfterElement(zone, ev.clientY, card);
            if(after==null) zone.appendChild(card); else zone.insertBefore(card, after);
          };
          const onUp=()=>{
            document.removeEventListener('pointermove', onMove);
            card.classList.remove('dragging');
            const ids=$$('[data-daily-id]', zone).map(el=>el.dataset.dailyId);
            ids.forEach((id,idx)=>{ const item=getDaily(id); if(item){ item.sortOrder=idx+1; item.updatedAt=nowIso(); } });
            if(ids.length) save();
            if(moved){ dailySortSuppressClick=true; setTimeout(()=>dailySortSuppressClick=false,250); }
          };
          document.addEventListener('pointermove', onMove, {passive:false});
          document.addEventListener('pointerup', onUp, {once:true});
          document.addEventListener('pointercancel', onUp, {once:true});
        });
      });
    }
    function getDragAfterElement(zone, y, dragging){
      return $$('[data-daily-id]', zone).filter(el=>el!==dragging).reduce((closest, child)=>{
        const box=child.getBoundingClientRect();
        const offset=y - box.top - box.height/2;
        if(offset < 0 && offset > closest.offset) return {offset, element:child};
        return closest;
      }, {offset:-Infinity, element:null}).element;
    }
    function linkedResourcesBlock(recordId='', dailyId=''){

    }
    function resourceTypes(){ return ['法本','PDF','官网','视频','音频','报名链接','Facebook 活动','Google Drive','图片','文字备注','其他']; }
    function resourceCard(r){ return `<div class="list-card" data-resource-id="${esc(r.id)}"><div class="bar"></div><div class="grow"><h3>${esc(r.title)}</h3><div class="meta">${esc(r.customType||r.type||'资料')} ${r.privacy?`｜ ${esc(r.privacy)}`:''}${r.requiresTransmission?`｜ 口传：${esc(r.requiresTransmission)}`:''}</div><div class="meta">${r.relatedPracticeName?`关联：${esc(r.relatedPracticeName)}`:''}</div></div></div>`; }
    function openResourceForm(data={}){
      const isEdit=!!data.id;
      const r={title:'',type:'法本',customType:'',url:'',relatedPracticeName:'',relatedRecordId:'',relatedDailyPracticeId:'',requiresTransmission:'',privacy:state.settings.defaultPrivacy||'私密',notes:'',...data};
      openModal(`<form id="resourceForm"><div class="modal-head"><div class="modal-title">${isEdit?'编辑':'新增'}法本 / 链接</div><button type="button" class="icon-btn" data-close>×</button></div><div class="modal-body"><div class="section-title">基础信息</div><label>标题 *</label><input name="title" required value="${esc(r.title)}"><label>类型</label><select name="type">${resourceTypes().map(t=>`<option ${r.type===t?'selected':''}>${t}</option>`).join('')}</select><div id="resCustomType"><label>自定义类型</label><input name="customType" value="${esc(r.customType)}"></div><label>链接</label><input name="url" inputmode="url" value="${esc(r.url)}"><div class="section-title">关联信息</div><label>关联法门</label><input name="relatedPracticeName" value="${esc(r.relatedPracticeName)}"><label>关联受法记录</label><select name="relatedRecordId"><option value="">不关联</option>${state.records.map(x=>`<option value="${esc(x.id)}" ${r.relatedRecordId===x.id?'selected':''}>${esc(x.date)} ${esc(x.practiceName)}｜${esc(x.teacher||'')}</option>`).join('')}</select><label>关联功课项目</label><select name="relatedDailyPracticeId"><option value="">不关联</option>${state.dailyItems.map(x=>`<option value="${esc(x.id)}" ${r.relatedDailyPracticeId===x.id?'selected':''}>${esc(displayDailyPath(x.id))}</option>`).join('')}</select><div class="section-title">权限与备注</div><div class="grid2"><div><label>是否需要口传</label><select name="requiresTransmission"><option value="">留空</option>${['是','否','不确定'].map(x=>`<option ${r.requiresTransmission===x?'selected':''}>${x}</option>`).join('')}</select></div><div><label>隐私级别</label><select name="privacy">${['公开','私密','不确定'].map(x=>`<option ${r.privacy===x?'selected':''}>${x}</option>`).join('')}</select></div></div><label>备注</label><textarea name="notes">${esc(r.notes)}</textarea></div><div class="modal-actions"><button type="button" class="btn" data-close>取消</button><button class="btn primary" type="submit">保存</button></div></form>`, root=>{ const form=$('#resourceForm',root); const toggle=()=>$('#resCustomType',root).classList.toggle('hidden',form.type.value!=='其他'); toggle(); form.type.onchange=toggle; root.addEventListener('click',e=>{if(e.target.closest('[data-close]')) closeModal();}); form.onsubmit=e=>{e.preventDefault(); const fd=new FormData(form); const obj={...r,id:isEdit?r.id:uid('res'), title:norm(fd.get('title')), type:norm(fd.get('type')), customType:fd.get('type')==='其他'?norm(fd.get('customType')):'', url:norm(fd.get('url')), relatedPracticeName:norm(fd.get('relatedPracticeName')), relatedRecordId:fd.get('relatedRecordId'), relatedDailyPracticeId:fd.get('relatedDailyPracticeId'), requiresTransmission:norm(fd.get('requiresTransmission')), privacy:norm(fd.get('privacy')), notes:norm(fd.get('notes')), updatedAt:nowIso(), createdAt:r.createdAt||nowIso()}; if(isEdit) state.resources=state.resources.map(x=>x.id===obj.id?obj:x); else state.resources.push(obj); save(); closeModal(); render();}; });
    }
    function showResourceDetail(id){ const r=getResource(id); if(!r)return; openModal(`<div class="modal-head"><div class="modal-title">资料详情</div><button class="icon-btn" data-close>×</button></div><div class="modal-body detail"><h2>${esc(r.title)}</h2><div class="card">${kv('类型', r.customType||r.type)}${kv('链接', r.url, true)}${kv('关联法门', r.relatedPracticeName)}${kv('关联记录', r.relatedRecordId ? `${getRecord(r.relatedRecordId)?.date || ''} ${getRecord(r.relatedRecordId)?.practiceName || ''}` : '')}${kv('关联功课', r.relatedDailyPracticeId ? displayDailyPath(r.relatedDailyPracticeId) : '')}${kv('需要口传', r.requiresTransmission)}${kv('隐私级别', r.privacy)}</div>${r.notes?`<div class="section-title">备注</div><div class="soft">${esc(r.notes).replace(/\n/g,'<br>')}</div>`:''}<div class="row wrap"><button class="btn primary" data-edit-resource="${esc(id)}">编辑</button>${r.url?`<a class="btn" href="${esc(r.url)}" target="_blank" rel="noopener">打开链接</a>`:''}<button class="btn danger" data-delete-resource="${esc(id)}">删除</button></div></div>`, root=>{ root.addEventListener('click',e=>{ if(e.target.closest('[data-close]')) closeModal(); const edit=e.target.closest('[data-edit-resource]'); if(edit) openResourceForm(getResource(edit.dataset.editResource)); const del=e.target.closest('[data-delete-resource]'); if(del) deleteResource(del.dataset.deleteResource); }); }); }
    function deleteResource(id){ const r=getResource(id); if(!r)return; if(!confirm(`确定删除「${r.title}」吗？`))return; state.resources=state.resources.filter(x=>x.id!==id); save(); closeModal(); render(); }
    function displayDailyPath(id){ const item=getDaily(id); if(!item)return ''; if(item.parentId){ const p=getDaily(item.parentId); return `${p?.name||''} › ${item.name}`; } return item.name; }

    function renderSettingsPage(){
      const root=$('#page-settings');
      root.innerHTML=`
        <div class="card"><div class="section-title" style="margin-top:0">备份与恢复</div><button class="btn primary" data-export-json>导出完整 JSON 备份</button> <button class="btn" data-import-json>导入 JSON 备份</button><div class="muted small" style="margin-top:8px">上次备份：${esc(state.settings.lastBackupAt || '尚未备份')}</div></div>
        <div class="card"><div class="section-title" style="margin-top:0">CSV</div><div class="row wrap"><button class="btn" data-export-csv="records">导出受法记录 CSV</button><button class="btn" data-import-records-csv>导入受法记录 CSV</button><button class="btn" data-export-csv="dailyItems">导出功课项目 CSV</button><button class="btn" data-export-csv="dailyCounts">导出功课计数 CSV</button><button class="btn" data-export-csv="resources">导出法本链接 CSV</button></div></div>
        <div class="card"><div class="section-title" style="margin-top:0">类型与颜色</div><div id="typeSettingsList">${state.typeSettings.sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0)).map(t=>typeSettingRow(t)).join('')}</div><button class="btn primary" data-add-type>＋ 添加类型</button></div>
        <div class="card"><div class="section-title" style="margin-top:0">默认设置</div><div class="grid2"><div><label>默认地点</label><input id="setDefaultLocation" value="${esc(state.settings.defaultLocation)}"></div><div><label>默认传承</label><input id="setDefaultLineage" value="${esc(state.settings.defaultLineage)}"></div></div><div class="grid2"><div><label>默认隐私级别</label><select id="setDefaultPrivacy">${['普通','私密','不确定'].map(x=>`<option ${state.settings.defaultPrivacy===x?'selected':''}>${x}</option>`).join('')}</select></div><div><label>默认记录遍数</label><input id="setDefaultDailyCount" type="number" value="${esc(state.settings.defaultDailyCount)}"></div></div><label>日历每周开始日</label><select id="setWeekStart"><option ${state.settings.calendarWeekStart==='周一'?'selected':''}>周一</option><option ${state.settings.calendarWeekStart==='周日'?'selected':''}>周日</option></select><button class="btn primary" data-save-settings>保存默认设置</button></div>
        <div class="card"><div class="section-title" style="margin-top:0">数据管理</div><div class="row wrap"><button class="btn danger" data-clear-all>清空全部数据</button><button class="btn" data-reset-sample>重置为空白数据</button></div></div>
        <div class="card"><div class="section-title" style="margin-top:0">关于</div><p class="muted small">本 App 数据保存在当前浏览器本地，不会上传服务器。更换手机、清理浏览器缓存或更换网址前，请先导出 JSON 备份。</p><p class="muted small">版本：MVP 2.5 · PWA 本地版</p></div>
      `;
      root.onclick=e=>{
        if(e.target.closest('[data-export-json]')) exportJson();
        if(e.target.closest('[data-import-json]')) importJson();
        const csv=e.target.closest('[data-export-csv]'); if(csv) exportCsv(csv.dataset.exportCsv);
        if(e.target.closest('[data-import-records-csv]')) importRecordsCsv();
        if(e.target.closest('[data-add-type]')) openTypeForm({});
        const edit=e.target.closest('[data-edit-type]'); if(edit) openTypeForm(state.typeSettings.find(t=>t.id===edit.dataset.editType));
        const delType=e.target.closest('[data-delete-type]'); if(delType) deleteTypeSetting(delType.dataset.deleteType);
        if(e.target.closest('[data-save-settings]')) saveAppSettings();
        if(e.target.closest('[data-clear-all]')) clearAll();
        if(e.target.closest('[data-reset-sample]')){ if(confirm('重置为空白数据会清空当前数据。建议先导出备份。确定继续？')){ state={...defaultState(), records:[], dailyItems:[], dailyCounts:[], resources:[]}; save(); render(); }}
      };
    }
    function typeSettingRow(t){ return `<div class="list-card"><span class="color-swatch" style="background:${esc(t.color)}"></span><div class="grow"><h3>${esc(t.name)}</h3><div class="meta">${t.isDefault?'默认类型':'自定义类型'}</div></div><button class="btn smallbtn" data-edit-type="${esc(t.id)}">编辑</button><button class="btn smallbtn danger" data-delete-type="${esc(t.id)}">删除</button></div>`; }
    function openTypeForm(data={}){ const isEdit=!!data.id; const t={name:'',color:'#8c8c8c',sortOrder:state.typeSettings.length+1,isDefault:false,...data}; openModal(`<form id="typeForm"><div class="modal-head"><div class="modal-title">${isEdit?'编辑':'新增'}类型</div><button type="button" class="icon-btn" data-close>×</button></div><div class="modal-body"><label>类型名称 *</label><input name="name" required value="${esc(t.name)}"><label>颜色 *</label><input name="color" type="color" value="${esc(t.color)}"><label>排序</label><input name="sortOrder" type="number" value="${esc(t.sortOrder||0)}"></div><div class="modal-actions"><button type="button" class="btn" data-close>取消</button><button class="btn primary" type="submit">保存</button></div></form>`, root=>{root.addEventListener('click',e=>{if(e.target.closest('[data-close]'))closeModal();}); $('#typeForm',root).onsubmit=e=>{e.preventDefault(); const fd=new FormData(e.target); const obj={...t,id:isEdit?t.id:uid('typ'),name:norm(fd.get('name')),color:fd.get('color'),sortOrder:Number(fd.get('sortOrder')||0),updatedAt:nowIso(),createdAt:t.createdAt||nowIso()}; if(isEdit) state.typeSettings=state.typeSettings.map(x=>x.id===obj.id?obj:x); else state.typeSettings.push(obj); save(); closeModal(); render();};}); }
    function deleteTypeSetting(id){ const t=state.typeSettings.find(x=>x.id===id); if(!t) return; const used=state.records.some(r=>typeName(r)===t.name || r.type===t.name); const msg=used ? `确定删除「${t.name}」吗？已有记录不会删除，但该类型颜色会回到默认颜色。` : `确定删除「${t.name}」吗？`; if(!confirm(msg)) return; state.typeSettings=state.typeSettings.filter(x=>x.id!==id); save(); render(); }
    function saveAppSettings(){ state.settings.defaultLocation=$('#setDefaultLocation').value; state.settings.defaultLineage=$('#setDefaultLineage').value; state.settings.defaultPrivacy=$('#setDefaultPrivacy').value; state.settings.defaultDailyCount=Number($('#setDefaultDailyCount').value||108); state.settings.calendarWeekStart=$('#setWeekStart').value; save(); alert('已保存默认设置'); render(); }

    function exportJson(){ state.settings.lastBackupAt=nowIso(); save(); downloadFile(`dharma-records-backup-${todayStr()}.json`, JSON.stringify(state,null,2), 'application/json'); render(); }
    function importJson(){ chooseFile('.json', file=>{ const reader=new FileReader(); reader.onload=()=>{ try{ const incoming=migrate(JSON.parse(reader.result)); const mode=confirm('确定覆盖当前数据吗？\n点“确定”=覆盖；点“取消”=合并。')?'cover':'merge'; if(mode==='cover') state=incoming; else { state.records=mergeById(state.records,incoming.records); state.dailyItems=mergeById(state.dailyItems,incoming.dailyItems); state.dailyCounts=mergeById(state.dailyCounts,incoming.dailyCounts); state.resources=mergeById(state.resources,incoming.resources); state.typeSettings=mergeById(state.typeSettings,incoming.typeSettings); state.settings={...state.settings,...incoming.settings}; } save(); alert('导入完成'); render(); }catch(e){alert('导入失败：JSON 格式不正确');} }; reader.readAsText(file); }); }
    function mergeById(a=[],b=[]){ const map=new Map(a.map(x=>[x.id,x])); b.forEach(x=>map.set(x.id,x)); return Array.from(map.values()); }
    function downloadFile(name, content, type='text/plain;charset=utf-8'){ const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),500); }
    function exportCsv(kind){ const rows = kind==='records'?state.records:kind==='dailyItems'?state.dailyItems:kind==='dailyCounts'?state.dailyCounts:state.resources; const csv=toCsv(rows); downloadFile(`${kind}-${todayStr()}.csv`, csv, 'text/csv;charset=utf-8'); }
    function toCsv(rows){ if(!rows.length) return ''; const cols=Array.from(rows.reduce((s,r)=>{Object.keys(r).forEach(k=>s.add(k)); return s;}, new Set())); return [cols.join(','), ...rows.map(r=>cols.map(c=>csvCell(Array.isArray(r[c])?r[c].join('，'):r[c])).join(','))].join('\n'); }
    function csvCell(v=''){ const s=String(v??''); return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s; }
    function importRecordsCsv(){ chooseFile('.csv', file=>{ const reader=new FileReader(); reader.onload=()=>{ try{ const rows=parseCsv(reader.result); const imported=rows.map(row=>({ id:uid('rec'), date:row.date||row['日期']||todayStr(), time:row.time||row['时间']||'', type:row.type||row['类型']||'灌顶', customType:row.customType||row['自定义类型']||'', status:row.status||row['状态']||'', practiceName:row.practiceName||row['法门名称']||row['法门']||'', teacher:row.teacher||row['上师']||'', location:row.location||row['地点']||'', lineage:row.lineage||row['传承']||'', customLineage:row.customLineage||row['自定义传承']||'', categories:asArray(row.categories||row['法类']), customCategories:asArray(row.customCategories||row['自定义法类']), visualizationNotesHtml:esc(row.visualizationNotesPlainText||row['灌顶观想内容']||'').replace(/\n/g,'<br>'), visualizationNotesPlainText:row.visualizationNotesPlainText||row['灌顶观想内容']||'', notes:row.notes||row['备注']||'', organizer:row.organizer||row['主办方']||'', registrationLink:row.registrationLink||row['报名链接']||'', textLink:row.textLink||row['法本链接']||'', hasText:row.hasText||row['是否已领法本']||'', privacy:row.privacy||row['隐私级别']||state.settings.defaultPrivacy, createdAt:nowIso(), updatedAt:nowIso()})).filter(r=>r.date && r.practiceName); state.records.push(...imported); save(); alert(`导入 ${imported.length} 条受法记录`); render(); }catch(e){ alert('CSV 导入失败'); } }; reader.readAsText(file); }); }
    function parseCsv(text){ const lines=[]; let row=[], cell='', q=false; for(let i=0;i<text.length;i++){ const ch=text[i], next=text[i+1]; if(q){ if(ch==='"'&&next==='"'){cell+='"';i++;} else if(ch==='"') q=false; else cell+=ch; } else { if(ch==='"') q=true; else if(ch===','){row.push(cell);cell='';} else if(ch==='\n'){row.push(cell);lines.push(row);row=[];cell='';} else if(ch!=='\r') cell+=ch; } } row.push(cell); lines.push(row); const head=lines.shift().map(h=>h.trim()); return lines.filter(r=>r.some(Boolean)).map(r=>Object.fromEntries(head.map((h,i)=>[h,r[i]||'']))); }
    function chooseFile(accept, cb){ const input=$('#fileInput'); input.accept=accept; input.value=''; input.onchange=()=>{ if(input.files[0]) cb(input.files[0]); }; input.click(); }
    function clearAll(){ if(!confirm('建议先导出 JSON 备份。确定要清空全部数据吗？')) return; const phrase=prompt('请输入“确认清空”'); if(phrase==='确认清空'){ state={...defaultState(), records:[], dailyItems:[], dailyCounts:[], resources:[]}; save(); render(); } }

    function openMonthPicker(baseDate, onPick){
      let year = baseDate.getFullYear();
      let month = baseDate.getMonth();
      const draw = () => {
        const months = Array.from({length:12}, (_,i)=>`<button type="button" class="month-option ${i===month?'selected':''}" data-month="${i}">${i+1}月</button>`).join('');
        $('#modalContent').innerHTML = `<div class="modal-head"><div class="modal-title">选择月份</div><button class="icon-btn" data-close>×</button></div><div class="modal-body"><div class="row between"><button class="icon-btn" data-year-down type="button">−</button><div style="font-size:22px;font-weight:900">${year}年</div><button class="icon-btn" data-year-up type="button">＋</button></div><div class="month-picker-grid" style="margin-top:14px">${months}</div></div><div class="modal-actions"><button class="btn" data-close type="button">取消</button><button class="btn primary" data-confirm-month type="button">确认</button></div>`;
      };
      openModal('', root=>{
        draw();
        root.onclick=e=>{
          if(e.target.closest('[data-close]')) closeModal();
          if(e.target.closest('[data-year-down]')){ year--; draw(); }
          if(e.target.closest('[data-year-up]')){ year++; draw(); }
          const m=e.target.closest('[data-month]'); if(m){ month=Number(m.dataset.month); draw(); }
          if(e.target.closest('[data-confirm-month]')){ closeModal(); onPick(new Date(year, month, 1)); }
        };
      });
    }

    function openModal(html, onReady){ const modal=$('#modal'); $('#modalContent').innerHTML=html; if(onReady) onReady($('#modalContent')); modal.showModal(); }
    function closeModal(){ $('#modal').close(); }

    $$('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{ currentTab=btn.dataset.tab; selectedDailyId=null; render(); }));
    $('#fab').addEventListener('click',()=>{ if(currentTab==='calendar'||currentTab==='records') openRecordForm({date: currentTab==='calendar'?selectedDate:todayStr()}); if(currentTab==='daily') openDailyForm({}); if(currentTab==='resources') openResourceForm({}); });
    $('#quickBackupBtn').addEventListener('click', exportJson);
    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
    save(); render();
  })();
  </script>
</body>
</html>
